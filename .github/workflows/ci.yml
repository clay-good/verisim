name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          # CPU-only torch so the model (M4) tests run without pulling CUDA wheels.
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -e ".[dev,model,viz]"
      - name: Lint (ruff)
        run: ruff check .
      - name: Type-check (mypy strict)
        run: mypy
      - name: Test (pytest)
        run: pytest
      - name: Build
        run: |
          pip install build
          python -m build
